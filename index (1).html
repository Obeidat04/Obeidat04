
<!DOCTYPE html>
<html>
<head>
<title>Contact Me</title>

<style>

body{
font-family: Arial;
background-color:#f4f6f8;
margin:0;
padding:0;
}

.container{
width:450px;
margin:60px auto;
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 0 8px rgba(0,0,0,0.15);
}

h1{
text-align:center;
color:#005fa3;
}

label{
font-weight:bold;
}

input, textarea{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#0077cc;
color:white;
border:none;
border-radius:5px;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#005fa3;
}

.back{
text-align:center;
margin-top:15px;
}

.back a{
color:#0077cc;
text-decoration:none;
font-weight:bold;
}

</style>

<script>

function validateForm(){

let name=document.forms["contactForm"]["fullname"].value;
let email=document.forms["contactForm"]["email"].value;
let country=document.forms["contactForm"]["country"].value;
let comment=document.forms["contactForm"]["comment"].value;

if(name=="" || email=="" || country=="" || comment==""){
alert("Please fill in all fields.");
return false;
}

alert("Form submitted successfully!");
return true;

}

</script>

</head>

<body>

<div class="container">

<h1>Contact Me</h1>

<form name="contactForm" onsubmit="return validateForm()">

<label>Full Name</label>
<input type="text" name="fullname">

<label>Email Address</label>
<input type="email" name="email">

<label>Country</label>
<input type="text" name="country">

<label>Comments</label>
<textarea name="comment" rows="4"></textarea>

<button type="submit">Submit</button>

</form>

<div class="back">
<a href="index.html">Back to Home</a>
</div>

</div>

</body>
</html>
